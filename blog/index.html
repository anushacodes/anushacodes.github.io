<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Blog — Anusha Nandy</title>
    <meta name="description" content="Notes on machine learning, systems, and the work behind the work." />
    <link rel="stylesheet" href="../styles.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <script src="../theme.js" defer></script>
    <style>
      .tag-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 1.5rem;
      }
      .tag-btn {
        appearance: none;
        background: none;
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted);
        cursor: pointer;
        font-family: var(--font);
        font-size: 0.75rem;
        padding: 2px 10px;
        transition: color 0.15s, border-color 0.15s, background 0.15s;
      }
      .tag-btn:hover, .tag-btn.active {
        color: var(--text);
        border-color: var(--text);
        background: var(--hover-bg);
      }
      .post-tags {
        display: flex;
        gap: 0.35rem;
        margin-top: 0.2rem;
        flex-wrap: wrap;
      }
      .tag {
        font-size: 0.7rem;
        color: var(--muted);
        background: var(--hover-bg);
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 1px 8px;
      }
      .list-item { flex-wrap: wrap; }
      .item-main { display: flex; align-items: baseline; justify-content: space-between; width: 100%; gap: 1rem; }
    </style>
  </head>
  <body>
    <header class="site-header">
      <nav class="nav">
        <a class="logo" href="../index.html">Anusha Nandy</a>
        <div class="nav-links">
          <a href="../index.html">Home</a>
          <span class="nav-sep">/</span>
          <a href="../projects/index.html">Projects</a>
          <span class="nav-sep">/</span>
          <a href="index.html" class="active">Blog</a>
          <span class="nav-sep">/</span>
          <a href="https://github.com/anushacodes" target="_blank" rel="noreferrer">GitHub</a>
          <button class="theme-btn" id="theme-toggle" type="button" aria-label="Toggle theme">Theme</button>
        </div>
      </nav>
    </header>

    <main class="page">
      <h1 class="page-title">Blog</h1>
      <p class="page-desc">Notes on machine learning, systems, and the work behind the work.</p>

      <div class="tag-filters" id="tag-filters"></div>

      <nav class="list" id="post-list" aria-label="Blog posts">
        <!-- draft="true" hides from public -->
        <a href="sample-post/index.html" class="list-item" data-tags="mlops,systems" data-draft="false">
          <div class="item-main">
            <span class="item-title">Building ML Systems That Don't Drift</span>
            <span class="item-date">Apr 2026</span>
          </div>
          <div class="post-tags">
            <span class="tag">mlops</span>
            <span class="tag">systems</span>
          </div>
        </a>

        <!-- Example draft post — hidden from public -->
        <a href="#" class="list-item" data-tags="research" data-draft="true">
          <div class="item-main">
            <span class="item-title">Notes on Attention Mechanisms (draft)</span>
            <span class="item-date">Apr 2026</span>
          </div>
          <div class="post-tags">
            <span class="tag">research</span>
          </div>
        </a>
      </nav>
    </main>

    <footer class="site-footer"></footer>

    <script>
      // Hide drafts
      document.querySelectorAll('[data-draft="true"]').forEach(el => el.remove());

      // Collect all tags from visible posts
      const posts = Array.from(document.querySelectorAll('#post-list .list-item'));
      const allTags = new Set();
      posts.forEach(p => p.dataset.tags.split(',').forEach(t => allTags.add(t.trim())));

      // Build filter buttons
      const filterContainer = document.getElementById('tag-filters');
      let active = null;

      const allBtn = document.createElement('button');
      allBtn.className = 'tag-btn active';
      allBtn.textContent = 'All';
      allBtn.addEventListener('click', () => {
        active = null;
        update();
      });
      filterContainer.appendChild(allBtn);

      allTags.forEach(tag => {
        const btn = document.createElement('button');
        btn.className = 'tag-btn';
        btn.textContent = tag;
        btn.addEventListener('click', () => { active = tag; update(); });
        filterContainer.appendChild(btn);
      });

      function update() {
        // Update button states
        filterContainer.querySelectorAll('.tag-btn').forEach((btn, i) => {
          if (i === 0) btn.classList.toggle('active', active === null);
          else btn.classList.toggle('active', btn.textContent === active);
        });
        // Show/hide posts
        posts.forEach(p => {
          const tags = p.dataset.tags.split(',').map(t => t.trim());
          p.style.display = (!active || tags.includes(active)) ? '' : 'none';
        });
      }
    </script>
  </body>
</html>
